media:
  input: static/uploads
  output: /uploads

content:
  - name: posts
    label: 文章
    path: content/posts
    type: collection
    fields:
      - name: title
        label: 標題
        type: string
      - name: date
        label: 日期
        type: date
      - name: cover
        label: 封面圖片
        type: image
      - name: coverCaption
        label: 封面圖說
        type: string
      - name: tags
        label: 標籤
        type: string
        list: true
      - name: series
        label: 系列
        type: string
        list: true
      - name: draft
        label: 草稿
        type: boolean
      - name: body
        label: 內文
        description: "內文圖說語法：切換到 Source 模式，在圖片網址後加引號 → ![描述](網址 \"圖說文字\")"
        type: rich-text